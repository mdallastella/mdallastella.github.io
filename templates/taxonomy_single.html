{% extends "base.html" %}
{% import "macros/post_link.html" as macros %}

{% block main %}
<section class="row">
  <div class="posts col-12 offset-md-2 col-md-8">
    <hgroup>
      <h1>#{{ term.name }}</h1>
    </hgroup>
    <ul>
      {% for p in term.pages %}
      <li>{{ macros::post_link(post=p) }}</li>
      {% endfor %}
    </ul>
  </div>
</section>
{% endblock main %}
