{% extends "base.html" %}

{% block main %}
<section class="row">
  <div class="posts col-12 offset-md-2 col-md-8">
    <hgroup>
      <h1>Tags</h1>
    </hgroup>
    <ul>
      {% for term in terms %}
      <li><a href="{{ term.permalink | safe }}">#{{ term.name }}</a> ({{ term.pages | length }})</li>
      {% endfor %}
    </ul>
  </div>
</section>
{% endblock main %}
