{% extends "base.html" %}
{% import "macros/post_link.html" as macros %}

{% block main %}
<section class="row">
  <div class="posts col-12 offset-md-2 col-md-8">
    {% for year, posts in section.pages | group_by(attribute="year") %}
    <h2>{{ year }}</h2>
    <ul>
      {% for p in posts %}
      <li>{{ macros::post_link(post=p) }}</li>
      {% endfor %}
    </ul>
    {% endfor %}
  </div>
</section>
{% endblock main %}
