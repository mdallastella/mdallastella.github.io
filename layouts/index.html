{{ define "extras" }}
<link rel="preload" as="image" href="{{ "img/portrait.webp" | relURL }}" type="image/webp" fetchpriority="high">
{{ end }}

{{ define "main" }}
<section class="row-fluid">
  <!-- Left column: portrait + content + social -->
  <div class="profile col-12 offset-md-2 col-md-4">

    <!-- Portrait -->
    <div class="profile-portrait">
      <img class="portrait" src="{{ "img/portrait.webp" | relURL }}" alt="Marco's portrait" decoding="async" />
    </div>

    <!-- Content -->
    <div class="profile-content">
      {{ .Content }}
    </div>

    <!-- Social -->
    <div class="profile-social">
      {{ partialCached "social.html" . }}
    </div>
  </div>

  <!-- Right column: recent posts -->
  <div class="posts col-12 offset-md-7 col-md-4">
    <hgroup>
      <h2>Recent posts</h2>
    </hgroup>
    <ul>
      {{ range first 5 (where site.RegularPages "Section" "posts") }}
      <li>{{ partial "post-link.html" . }}</li>
      {{ end }}
    </ul>
    <a href="/posts/">More…</a>
  </div>
</section>
{{ end }}
