base_url = "https://marco.dallastella.name"
title = "Marco Dalla Stella"
description = "Marco, a code alchemist and thinker, transforms raw data into noble insights. Software developer and admin of Functional Cafè. Blending science, philosophy, and programming wizardry, Marco solves fascinating problems with clarity and purpose, crafting beauty through programming."
default_language = "en"

compile_sass = true
generate_feeds = true
feed_filenames = ["rss.xml"]
build_search_index = false

taxonomies = [
    { name = "tags", feed = true },
]

# Preserve existing Hugo URLs (keep underscores in post paths)
[slugify]
paths = "safe"

[markdown]
render_emoji = true

[markdown.highlighting]
enabled = true
theme = "solarized-light"

