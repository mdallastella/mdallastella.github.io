server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    gzip on;
    gzip_types text/plain text/css application/xml application/rss+xml application/javascript image/svg+xml;
    gzip_min_length 256;

    location /css/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /img/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(html|xml|rss)$ {
        expires 1h;
        add_header Cache-Control "public";
    }

    location / {
        try_files $uri $uri/ =404;
    }

    error_page 404 /404.html;
}
